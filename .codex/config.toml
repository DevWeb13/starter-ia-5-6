model = "gpt-5.6"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[agents]
max_threads = 3
max_depth = 1

[agents.explorer]
description = "Explore le dépôt en lecture seule et collecte les faits utiles."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Effectue une revue indépendante en lecture seule selon QUALITY.md."
config_file = "agents/reviewer.toml"
